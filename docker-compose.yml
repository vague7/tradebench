networks:
  platform-net:
    driver: bridge

  bench-net:
    driver: bridge
    internal: true

volumes:
  submissions-data:
  postgres-data:
  redis-data:

services:
  postgres:
    image: timescale/timescaledb:latest-pg15
    networks:
      - platform-net
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: bench
      POSTGRES_USER: bench
      POSTGRES_PASSWORD: bench
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "bench"]
      interval: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    networks:
      - platform-net
    volumes:
      - redis-data:/data

  api-gateway:
    build:
      context: .
      dockerfile: ./services/api-gateway/Dockerfile
    networks:
      - platform-net
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - submissions-data:/data/submissions
      - /var/run/docker.sock:/var/run/docker.sock
    env_file:
      - .env

  sandbox-engine:
    build:
      context: .
      dockerfile: ./services/sandbox-engine/Dockerfile
    networks:
      - platform-net
    volumes:
      - submissions-data:/data/submissions
      - /var/run/docker.sock:/var/run/docker.sock
    env_file:
      - .env
    depends_on:
      - redis
      - postgres

  bot-fleet:
    build:
      context: .
      dockerfile: ./services/bot-fleet/Dockerfile
    networks:
      - platform-net
      - bench-net
    env_file:
      - .env
    depends_on:
      - redis

  telemetry-ingester:
    build:
      context: .
      dockerfile: ./services/telemetry-ingester/Dockerfile
    networks:
      - platform-net
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./services/frontend
      args:
        VITE_API_BASE: http://localhost:8080
    networks:
      - platform-net
    ports:
      - "3000:80"
